name: DevSecOps CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Installation de Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installation des dépendances Python
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install yamllint

      - name: Vérification syntaxe YAML
        run: |
          yamllint .github/workflows/ci.yml
          yamllint k8s/deployment.yaml

      - name: Build image Docker
        run: |
          docker build -t devsecops-flask-app:latest .

      - name: Scan Trivy filesystem
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "table"
          exit-code: "0"
          severity: "CRITICAL,HIGH,MEDIUM"

      - name: Scan Trivy image Docker
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: "devsecops-flask-app:latest"
          format: "table"
          exit-code: "0"
          severity: "CRITICAL,HIGH,MEDIUM"

      - name: Installer Conftest
        run: |
          wget https://github.com/open-policy-agent/conftest/releases/download/v0.55.0/conftest_0.55.0_Linux_x86_64.tar.gz
          tar xzf conftest_0.55.0_Linux_x86_64.tar.gz
          sudo mv conftest /usr/local/bin

      - name: Vérification politique sécurité Kubernetes
        run: |
          conftest test k8s/deployment.yaml --policy policy